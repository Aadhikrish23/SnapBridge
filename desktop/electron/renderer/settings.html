<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SnapBridge Settings</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <h1>⚙️ SnapBridge Settings</h1>

  <div class="card">
    <div class="form-group">
      <label for="uploadFolder">Upload Directory</label>
      <div class="form-row">
        <input type="text" id="uploadFolder" class="form-control" readonly>
        <button id="btnBrowse" class="btn btn-secondary">Browse</button>
      </div>
    </div>

    <div class="form-group">
      <label for="port">Local Server Port</label>
      <input type="number" id="port" class="form-control" min="1024" max="65535">
    </div>
  </div>

  <div class="card">
    <div class="checkbox-container">
      <label class="checkbox-group">
        <input type="checkbox" id="autoOpenFolder">
        <span>Automatically open folder when image is received</span>
      </label>

      <label class="checkbox-group">
        <input type="checkbox" id="autoCopyClipboard">
        <span>Copy received images to Windows clipboard</span>
      </label>

      <label class="checkbox-group">
        <input type="checkbox" id="notificationsEnabled">
        <span>Show desktop notifications</span>
      </label>

      <label class="checkbox-group">
        <input type="checkbox" id="startWithWindows">
        <span>Start SnapBridge on Windows startup</span>
      </label>
    </div>
  </div>

  <div class="card" style="border-color: rgba(239, 68, 68, 0.4); background-color: rgba(239, 68, 68, 0.03);">
    <div style="display: flex; align-items: center; justify-content: space-between;">
      <div>
        <div style="font-weight: 500; font-size: 0.9rem;">Reset Device Pairing</div>
        <div style="font-size: 0.75rem; color: var(--text-secondary); margin-top: 4px;">Unpair all devices and generate a new secure pairing ID.</div>
      </div>
      <button id="btnReset" class="btn btn-danger btn-secondary">Reset</button>
    </div>
  </div>

  <div class="actions">
    <button id="btnCancel" class="btn btn-secondary">Cancel</button>
    <button id="btnSave" class="btn">Save Settings</button>
  </div>

  <div id="toast" class="status-toast">Settings saved successfully!</div>

  <script src="settings.js"></script>
</body>
</html>
