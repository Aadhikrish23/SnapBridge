<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SnapBridge Pairing</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <h1>📱 Device Pairing</h1>

  <div class="qr-card-container">
    <div id="qrLoader" style="color: var(--text-secondary); margin-bottom: 20px;">Generating secure pairing code...</div>
    <div id="qrHolder" class="qr-canvas-holder" style="display: none;">
      <img id="qrImage" alt="Pairing QR Code">
    </div>
    
    <div class="qr-info">
      Open the SnapBridge app on your Android phone and scan this QR code to establish a secure, private connection.
    </div>
  </div>

  <div class="actions" style="justify-content: center; margin-top: 0;">
    <button id="btnClose" class="btn btn-secondary">Close Window</button>
  </div>

  <script src="qr.js"></script>
</body>
</html>
